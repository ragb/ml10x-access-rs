# yaml-language-server: $schema=https://example/preset.schema.json
preset:
  bank: 1
  number: 0
  name: Base
  spillover:
    output_tip: nothing
    output_ring: nothing
  body:
    mode: simple
    chain:
      - { from_connector: input_tip, to_connector: a_tip, bypass: false }
      - { from_connector: a_tip,     to_connector: output_tip, bypass: false }
